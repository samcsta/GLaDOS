<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GLaDOS Ops Dashboard</title>
  <script>
    try {
      const root = document.documentElement;
      root.dataset.colorProfile = localStorage.getItem('glados-dash.color-profile') || 'classic';
      root.dataset.density = localStorage.getItem('glados-dash.density') || 'comfortable';
      root.dataset.fontSize = localStorage.getItem('glados-dash.font-size') || 'default';
    } catch {
      const root = document.documentElement;
      root.dataset.colorProfile = 'classic';
      root.dataset.density = 'comfortable';
      root.dataset.fontSize = 'default';
    }
  </script>
  <link rel="stylesheet" href="/styles.css?v=20260617-appearance-controls" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span> GLaDOS Ops
    </div>
    <nav class="tabs" id="tabs"></nav>
    <div class="controls">
      <label class="toggle"><input type="checkbox" id="errors-only" /> Errors only</label>
      <label class="toggle" title="When off, hide thinking blocks and intermediate tool calls — show only your input to GLaDOS, tool results, and final assistant output."><input type="checkbox" id="debug-mode" checked /> Debug</label>
      <button id="restart-gateway" title="openclaw daemon restart — restarts the WebSocket Gateway via launchd">Restart gateway</button>
      <button id="reset-session" title="Archive the current agent's session JSONL — next turn starts fresh">Reset session</button>
      <button id="halt-one" disabled>Halt agent</button>
      <button id="resume-all" class="safe" title="Clear dashboard halt-all deny rules and re-enable Burp scope">Resume All</button>
      <button id="halt-all" class="danger">Halt All</button>
    </div>
  </header>

  <div id="health-banner" class="health-banner hidden" role="alert">
    <span class="health-banner-msg" id="health-banner-msg"></span>
    <span class="health-banner-actions">
      <button id="health-reapply-btn" type="button">Re-apply patches</button>
      <button id="health-details-btn" type="button">Details</button>
      <button id="health-dismiss-btn" type="button" title="Hide until next failure">✕</button>
    </span>
  </div>

  <main class="layout">
    <aside class="sidebar">
      <h2 class="collapsible-heading" id="workspace-heading" data-section="workspace" title="Click to collapse/expand">
        <span class="collapsible-chevron">▾</span> Workspace
      </h2>
      <div class="workspace-links" id="workspace-links">
        <a href="#" id="open-glados">GLaDOS</a>
        <a href="#" id="open-chatbot">ChatBot</a>
        <a href="#" id="open-reports">Reports</a>
        <a href="#" id="open-terminal">Terminal</a>
        <a href="#" id="open-proxy">Proxy</a>
      </div>
      <h2 class="collapsible-heading" id="agents-heading" data-section="agents" title="Click to collapse/expand">
        <span class="collapsible-chevron">▾</span> Agents
      </h2>
      <ul id="agent-list"></ul>
      <h2 class="collapsible-heading" id="indicators-heading" data-section="indicators" title="Click to collapse/expand">
        <span class="collapsible-chevron">▾</span> Indicators
      </h2>
      <div class="indicators-group" id="indicators-group">
        <div class="indicator" title="Burp Pro requests-per-second, 10s rolling window, polled from /v0.1/proxy/http_history every 5s.">Burp RPS <span id="burp-rps" class="pill muted">—</span></div>
      </div>
      <h2 class="collapsible-heading" id="help-heading" data-section="help" title="Click to collapse/expand">
        <span class="collapsible-chevron">▾</span> Help
      </h2>
      <div class="workspace-links" id="help-links">
        <a href="#" id="open-settings">Settings</a>
        <a href="#" id="open-about">About</a>
      </div>
    </aside>

    <section class="pane" id="pane">
      <div class="pane-empty">Select an agent tab or start chatting with GLaDOS.</div>
    </section>
  </main>

  <footer class="events">
    <div class="events-label">
      <span>LIVE EVENTS</span>
      <button id="events-clear" class="events-clear-btn" title="Clear the live events feed (client-side only)">Clear</button>
    </div>
    <div id="events"></div>
  </footer>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="/app.js?v=20260617-appearance-controls"></script>
</body>
</html>
